[constraints]
max_cycles = 0
max_cc = 25
max_fn_lines = 100
no_god_files = false

[[layers]]
name = "core"
paths = ["internal/gofer/*"]
order = 0

[[layers]]
name = "app"
paths = ["cmd/*"]
order = 1

[[boundaries]]
from = "cmd/*"
to = "internal/gofer/*"
reason = "Commands depend on core library only"
