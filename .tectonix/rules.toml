[constraints]
max_cycles = 0
max_cc = 25
max_fn_lines = 100
no_god_files = false

[[layers]]
name = "core"
paths = ["cmd/gofer/*"]
order = 0

[[layers]]
name = "app"
paths = ["cmd/bench/*"]
order = 1

[[boundaries]]
from = "cmd/bench/*"
to = "cmd/gofer/*"
reason = "Bench runner invokes go test; no direct import"
