[constraints]
max_cycles = 0
max_cc = 25
max_fn_lines = 100
no_god_files = false

[[layers]]
name = "core"
paths = ["cmd/gofer/*"]
order = 0

[[layers]]
name = "training"
paths = ["training/*"]
order = 1

[[layers]]
name = "ops"
paths = ["scripts/*"]
order = 2

[[boundaries]]
from = "scripts/*"
to = "cmd/gofer/*"
reason = "Shell ops must not import Go engine internals directly"
